<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>در حال بروزرسانی | لطفاً چند ساعت دیگر مراجعه کنید</title>
    <!-- فونت فارسی وزیر متن -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #fef9f0 0%, #fdf2e4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            direction: rtl;
        }

        /* پس‌زمینه متحرک با نقطه‌های پولکا */
        .polka-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#f8c2b0 1.2px, transparent 1.2px);
            background-size: 36px 36px;
            opacity: 0.25;
            pointer-events: none;
            z-index: 0;
            animation: polkaMove 35s linear infinite;
        }

        @keyframes polkaMove {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 100px 50px;
            }
        }

        /* کارت اصلی */
        .main-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 248, 245, 0.8);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            background: #fffffffa;
            box-shadow: 0 25px 55px rgba(220, 160, 140, 0.18),
                        0 10px 25px rgba(200, 130, 110, 0.12);
            border-radius: 48px;
            padding: 3.5rem 2.8rem;
            max-width: 620px;
            width: 90%;
            text-align: center;
            border: 1.5px solid rgba(255, 220, 200, 0.5);
            animation: softFloat 5s ease-in-out infinite;
            transition: all 0.3s ease;
        }

        @keyframes softFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* انیمیشن ابرهای بامزه */
        .clouds {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.4rem;
            margin-bottom: 1.2rem;
            position: relative;
        }

        .cloud {
            background: white;
            border-radius: 80px;
            position: relative;
            box-shadow: 0 8px 18px rgba(255, 180, 140, 0.25);
            animation: cloudFloat 4.2s ease-in-out infinite;
        }
        .cloud::before,
        .cloud::after {
            content: "";
            background: white;
            border-radius: 50%;
            position: absolute;
        }
        .cloud1 {
            width: 95px;
            height: 50px;
            margin-top: 20px;
            animation-delay: 0s;
        }
        .cloud1::before {
            width: 50px;
            height: 50px;
            top: -28px;
            left: 18px;
        }
        .cloud1::after {
            width: 38px;
            height: 38px;
            top: -18px;
            right: 14px;
        }

        .cloud2 {
            width: 68px;
            height: 36px;
            margin-top: 32px;
            animation-delay: 1.5s;
        }
        .cloud2::before {
            width: 38px;
            height: 38px;
            top: -24px;
            left: 12px;
        }
        .cloud2::after {
            width: 28px;
            height: 28px;
            top: -14px;
            right: 10px;
        }

        .cloud3 {
            width: 80px;
            height: 42px;
            margin-top: 24px;
            animation-delay: 0.8s;
        }
        .cloud3::before {
            width: 44px;
            height: 44px;
            top: -26px;
            left: 16px;
        }
        .cloud3::after {
            width: 34px;
            height: 34px;
            top: -16px;
            right: 14px;
        }

        @keyframes cloudFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        /* تصویر رافیکی یا کاراکتر دوست‌داشتنی */
        .cute-character {
            font-size: 6.5rem;
            margin: 0.4rem 0 0.8rem;
            display: flex;
            justify-content: center;
            gap: 0.2rem;
            filter: drop-shadow(0 12px 14px rgba(220, 130, 90, 0.25));
            animation: characterWiggle 2.8s infinite ease-in-out;
        }

        @keyframes characterWiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(1.5deg); }
            75% { transform: rotate(-1.5deg); }
        }

        .gear-icon {
            font-size: 2.8rem;
            display: inline-block;
            animation: spinGear 6s linear infinite;
            margin: 0 0.2rem;
        }
        .gear-icon:nth-child(2) {
            animation-direction: reverse;
            animation-duration: 4.5s;
        }

        @keyframes spinGear {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            font-size: 2.1rem;
            font-weight: 800;
            color: #5d4037;
            margin: 1.3rem 0 0.8rem;
            letter-spacing: -0.3px;
            line-height: 1.4;
        }

        .highlight {
            background: linear-gradient(120deg, #ffc1a6 0%, #ffb08c 70%);
            padding: 0.1rem 0.7rem;
            border-radius: 28px;
            color: #4a2e22;
            display: inline-block;
            margin: 0 2px;
        }

        .message {
            font-size: 1.25rem;
            color: #6b4f44;
            margin: 1.2rem 0 1.8rem;
            font-weight: 500;
            background: rgba(255, 235, 220, 0.55);
            padding: 0.8rem 1.8rem;
            border-radius: 60px;
            display: inline-block;
        }

        .time-badge {
            background: #ffffff;
            border: 1.8px solid #ffb997;
            border-radius: 40px;
            padding: 0.7rem 2rem;
            font-size: 1.3rem;
            font-weight: 700;
            color: #b1553b;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 6px 16px rgba(255, 155, 110, 0.22);
            margin: 0.5rem 0 0.3rem;
            backdrop-filter: blur(4px);
        }

        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin: 1.8rem 0 0.8rem;
        }
        .dot {
            width: 13px;
            height: 13px;
            background: #fec89a;
            border-radius: 50%;
            animation: dotPulse 1.6s infinite ease-in-out;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; background: #ffb482; }
        .dot:nth-child(3) { animation-delay: 0.4s; background: #ffa16c; }
        .dot:nth-child(4) { animation-delay: 0.6s; background: #ff9052; }

        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1.35); opacity: 1; }
        }

        .footer-note {
            margin-top: 2rem;
            color: #b29380;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        @media (max-width: 480px) {
            .main-card {
                padding: 2.2rem 1.4rem;
                border-radius: 36px;
            }
            h1 {
                font-size: 1.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="polka-bg"></div>

    <!-- کارت اصلی با افکت شیشه‌ای -->
    <div class="main-card">
        <!-- ابرهای متحرک -->
        <div class="clouds">
            <div class="cloud cloud1"></div>
            <div class="cloud cloud2"></div>
            <div class="cloud cloud3"></div>
        </div>

        <!-- کاراکترهای بامزه (رافیکی و دوستان) -->
        <div class="cute-character">
            <span>🦝</span>
            <span class="gear-icon">⚙️</span>
            <span>🐾</span>
            <span class="gear-icon">🔧</span>
            <span>✨</span>
        </div>

        <h1>
            <span class="highlight">صفحه در حال بروزرسانی</span> است!
        </h1>

        <div class="message">
            🌿 چند ساعت دیگر امتحان کنید 🌿
        </div>

        <div class="time-badge">
            <span>⏳</span> تا ساعاتی دیگر برمی‌گردیم <span>⌛️</span>
        </div>

        <!-- نقطه‌های متحرک برای حس پویایی -->
        <div class="progress-dots">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>

        <div class="footer-note">
            🧸 تیم ما سخت در تلاش است تا تجربه‌ای بهتر برایتان بسازد
        </div>
    </div>
</body>
</html>
